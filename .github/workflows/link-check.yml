name: Link check

on:
  push:
    branches: [main]
  schedule:
    # Weekly sweep so link rot is caught even when the README isn't changing.
    - cron: "17 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Check links in README.md
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # LinkedIn answers automated clients with HTTP 999, so it cannot be
          # validated from CI and is excluded. 429s are accepted to avoid
          # flaky failures when a badge host rate-limits the runner.
          args: >-
            --no-progress
            --accept '100..=103,200..=299,429'
            --exclude 'linkedin\.com'
            README.md
